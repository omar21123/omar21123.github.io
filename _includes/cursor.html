<div id="cursor-container">
  <div id="custom-cursor-outline"></div>
</div>

<style>
  /* 1. On cache la souris réelle sur PC */
  @media (min-width: 769px) {
    *, *::before, *::after {
      cursor: none !important;
    }

    #custom-cursor-arrow {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999999;
      will-change: transform;
      transform: translate(-100px, -100px);
    }

    #custom-cursor-outline {
      position: fixed;
      top: 0;
      left: 0;
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255, 51, 51, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999998;
      transform: translate(-50%, -50%);
      transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s;
    }

    #cursor-canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 9999997;
    }

    /* Style quand on survole un lien */
    .cursor-hover-active {
      width: 60px !important;
      height: 60px !important;
      background-color: rgba(255, 51, 51, 0.1) !important;
      border-color: rgba(255, 51, 51, 0.8) !important;
    }
  }

  /* 2. On désactive tout sur mobile */
  @media (max-width: 768px) {
    #cursor-container, #cursor-canvas, #custom-cursor-arrow {
      display: none !important;
    }
    * {
      cursor: auto !important;
    }
  }
</style>

<script>
(function() {
  if (window.innerWidth < 769) return;

  // Création de la flèche
  const arrow = document.createElement('div');
  arrow.id = 'custom-cursor-arrow';
  arrow.innerHTML = `
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="26" viewBox="0 0 20 24" style="filter: drop-shadow(0 0 5px rgba(255,51,51,0.5));">
      <polygon points="0,0 0,18 5,13 9,22 12,21 8,12 14,12" fill="#ffffff" stroke="#ff3333" stroke-width="1.5"/>
    </svg>`;
  document.body.appendChild(arrow);

  // Création du canvas pour les particules
  const canvas = document.createElement('canvas');
  canvas.id = 'cursor-canvas';
  const ctx = canvas.getContext('2d');
  document.body.appendChild(canvas);

  const outline = document.getElementById('custom-cursor-outline');
  let mx = -100, my = -100; // Position souris
  let ox = -100, oy = -100; // Position cercle (smooth)
  const particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  document.addEventListener('mousemove', (e) => {
    mx = e.clientX;
    my = e.clientY;
    
    // Déplacement flèche
    arrow.style.transform = `translate(${mx}px, ${my}px)`;

    // Création particules
    if (Math.random() < 0.4) {
      particles.push({
        x: mx, y: my,
        r: 1.2 + Math.random() * 2,
        a: 0.8,
        vx: (Math.random() - 0.5) * 1.5,
        vy: (Math.random() - 0.5) * 1.5,
        color: Math.random() > 0.4 ? '#ff3333' : '#ffffff'
      });
    }
  });

  // Effet hover sur les liens
  function updateHover() {
    document.querySelectorAll('a, button, .post-tag').forEach(el => {
      el.addEventListener('mouseenter', () => outline.classList.add('cursor-hover-active'));
      el.addEventListener('mouseleave', () => outline.classList.remove('cursor-hover-active'));
    });
  }
  updateHover();

  function animate() {
    // Animation fluide du cercle (lerp)
    ox += (mx - ox) * 0.15;
    oy += (my - oy) * 0.15;
    outline.style.left = `${ox}px`;
    outline.style.top = `${oy}px`;

    // Animation particules
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.a -= 0.02;
      if (p.a <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = p.a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>
