# The Site Configuration
remote_theme: cotes2020/jekyll-theme-chirpy

lang: en

timezone: Africa/Casablanca          # ← good choice for Fes, Morocco

title: Omar El Bouhsaini
tagline: my personal blog
description: >-
  Welcome to my personal blog — thoughts on programming, tech, life, and whatever I find interesting.

url: "https://omar21123.github.io"

github:
  username: omar21123

twitter:
  username: ""                       # ← change to your real handle e.g. omarelb (without @)

social:
  name: Omar El Bouhsaini
  email: elbouhsainiomar@gmail.com
  links:
    - https://twitter.com/             # ← update if you have Twitter
    - https://github.com/omar21123
    # - https://www.linkedin.com/in/YOUR-LINKEDIN-USERNAME-HERE   ← highly recommended to add
    # - https://stackoverflow.com/users/xxxx/xxxxxxx              ← if you have

webmaster_verifications:
  google: 
  bing: 
  facebook: 

analytics:
  google:
    id: 
  goatcounter:
    id: 
  umami:
    id: 
    domain: 

pageviews:
  provider: 

theme_mode:                        # light / dark / empty = system + toggle

cdn: 

avatar: https://media.licdn.com/dms/image/v2/D4E03AQFLy3-NjENwIQ/profile-displayphoto-shrink_800_800/B4EZYrBLcIG0Ak-/0/1744478453462?e=1770249600&v=beta&t=9sGx2O1qP_LMhk53ndJ0LheG22iAc2Qz8mto8aeJQK0

social_preview_image:              # optional — you can add later

toc: true

comments:
  provider:                        # disqus / utterances / giscus / empty = disabled
  utterances:
    repo:                          # omar21123/omar21123.github.io   ← example
    issue_term: pathname
  giscus:
    repo: 
    repo_id: 
    category: 
    category_id: 

assets:
  self_host:
    enabled: false

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:
      # - "/example"

paginate: 10

baseurl: ""

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
